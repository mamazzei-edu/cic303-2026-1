name: Corretor Automático JACA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurar JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Executar Testes (Juiz Automático)
      run: mvn -B test --file fase01-o-caos-das-strings/pom.xml